name: quantum_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - cuquantum-python
  - cuda-version=12.1
  - pandas
  - numpy
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - plotly
  - h5py
  - tqdm
  - jupyter
  - ipykernel
  - pip
  - pip:
    - nvmath-python>=0.1.0  # cuQuantum 0.3.0+ 필수 의존성
    - cupy-cuda12x>=13.0.0  # conda의 cupy와 충돌을 피하기 위해 명시
    - cudaq>=0.8.0
    - qiskit>=1.0.0
    - qiskit-aer>=0.14.0
    - pennylane>=0.35.0
    - pennylane-qiskit>=0.35.0
    - pennylane-lightning-gpu>=0.35.0
